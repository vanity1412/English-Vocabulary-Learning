<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Format Đề Thi - TOEIC</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/exam.css">
</head>
<body>
    <div class="container" id="examApp">
        <header>
            <button class="btn btn-secondary back-btn" onclick="window.location.href='index.html'">⬅️ Quay lại</button>
            <h1>📋 Format Đề Thi TOEIC</h1>
        </header>

        <!-- Exam Selection View -->
        <div id="examSelectionView">
            <h2 style="color: white; text-align: center; margin: 20px 0;">Chọn phần thi</h2>
            <div id="examList" class="exam-list"></div>
        </div>

        <!-- Exam Test View -->
        <div id="examTestView" style="display: none;">
            <div class="exam-container">
                <div class="exam-header">
                    <div class="exam-progress">
                        Câu <span id="examQuestionNumber">1</span>/<span id="examTotalQuestions">30</span>
                    </div>
                    <div class="exam-timer">
                        ⏱️ <span id="examTimer">15:00</span>
                    </div>
                </div>

                <div class="exam-content">
                    <div id="examPassage" class="exam-passage" style="display: none;">
                        <h4>Đoạn văn:</h4>
                        <p id="examPassageText"></p>
                    </div>

                    <div class="exam-question-section">
                        <p id="examQuestion" class="exam-question"></p>
                        <div id="examOptions" class="exam-options"></div>
                    </div>
                </div>

                <div class="exam-navigation">
                    <button class="btn btn-secondary" onclick="navigateExamQuestion(-1)">⬅️ Câu trước</button>
                    <button class="btn btn-primary" onclick="submitExam()">✅ Nộp bài</button>
                    <button class="btn btn-secondary" onclick="navigateExamQuestion(1)">Câu sau ➡️</button>
                </div>
            </div>
        </div>

        <!-- Exam Result View -->
        <div id="examResultView" style="display: none;">
            <div class="exam-result-container">
                <h2>🎉 Kết quả bài thi</h2>
                <div class="result-summary">
                    <div class="result-score">
                        <h3>Điểm số</h3>
                        <p id="examResultScore">0/30</p>
                    </div>
                    <div class="result-percentage">
                        <h3>Tỷ lệ đúng</h3>
                        <p id="examResultPercentage">0%</p>
                    </div>
                </div>
                
                <h3 style="margin-top: 30px;">📝 Xem lại đáp án</h3>
                <div id="examReviewList" class="exam-review-list"></div>
                
                <button class="btn btn-primary btn-large" onclick="backToExamSelection()">
                    Chọn đề khác
                </button>
            </div>
        </div>
    </div>

    <script src="js/exam.js"></script>
</body>
</html>
