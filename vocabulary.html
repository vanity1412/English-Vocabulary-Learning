<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Từ Vựng - TOEIC</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/vocabulary.css">
</head>
<body>
    <div class="container" id="mainApp">
        <header>
            <button class="btn btn-secondary back-btn" onclick="window.location.href='index.html'">⬅️ Quay lại</button>
            <h1>📚 Học Từ Vựng Tiếng Anh</h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
                <span class="progress-text" id="progressText">0/0 từ đã học</span>
            </div>
            <div class="header-actions">
                <div class="keyboard-shortcuts">
                    <button class="shortcuts-toggle" id="shortcutsToggle">⌨️ Phím tắt</button>
                    <div class="shortcuts-panel hidden" id="shortcutsPanel">
                        <h4>Phím tắt</h4>
                        <div class="shortcut-list">
                            <div class="shortcut-item">
                                <kbd>←</kbd> <kbd>→</kbd>
                                <span>Chuyển thẻ</span>
                            </div>
                            <div class="shortcut-item">
                                <kbd>↑</kbd> <kbd>↓</kbd> <kbd>Space</kbd>
                                <span>Lật thẻ</span>
                            </div>
                            <div class="shortcut-item">
                                <kbd>\</kbd>
                                <span>Phát âm</span>
                            </div>
                            <div class="shortcut-item">
                                <kbd>Enter</kbd>
                                <span>Đánh dấu đã nhớ</span>
                            </div>
                        </div>
                        <p class="shortcut-note">💡 Tắt UniKey để phím tắt hoạt động chính xác</p>
                    </div>
                </div>
                <button class="settings-btn" id="settingsBtn">⚙️ Cài đặt</button>
            </div>
        </header>

        <!-- Settings Modal -->
        <div class="modal hidden" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>⚙️ Cài đặt</h3>
                    <button class="modal-close" id="closeSettings">✕</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label>🔊 Tốc độ phát âm:</label>
                        <input type="range" id="speechRate" min="0.5" max="1.5" step="0.1" value="0.8">
                        <span id="speechRateValue">0.8x</span>
                    </div>
                    <div class="setting-group">
                        <label>🎨 Chế độ tối:</label>
                        <label class="toggle-label">
                            <input type="checkbox" id="darkModeToggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-group">
                        <label>🔄 Tự động phát âm khi lật thẻ:</label>
                        <label class="toggle-label">
                            <input type="checkbox" id="autoSpeakToggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-group">
                        <label>📊 Hiển thị tiến độ chi tiết:</label>
                        <label class="toggle-label">
                            <input type="checkbox" id="detailedProgressToggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    <div class="setting-group">
                        <button class="btn btn-secondary btn-block" id="resetProgressBtn">🔄 Reset tiến độ học</button>
                        <button class="btn btn-secondary btn-block" id="exportProgressBtn">💾 Xuất dữ liệu</button>
                        <button class="btn btn-secondary btn-block" id="importProgressBtn">📥 Nhập dữ liệu</button>
                        <input type="file" id="importFileInput" accept=".json" style="display: none;">
                    </div>
                </div>
            </div>
        </div>

        <div class="list-selector">
            <label>📚 Chọn danh sách:</label>
            <select id="vocabListSelect">
                <option value="vocab/vocab_1.json">List 1</option>
                <option value="vocab/vocab_2.json">List 2</option>
                <option value="vocab/vocab_3.json">List 3</option>
                <option value="vocab/vocab_4.json">List 4</option>
                <option value="vocab/vocab_5.json">List 5</option>
                <option value="vocab/vocab_6.json">List 6</option>
                <option value="vocab/vocab_7.json">List 7</option>
                <option value="vocab/vocab_8.json">List 8</option>
                <option value="vocab/vocab_9.json">List 9</option>
                <option value="vocab/vocab_10.json">List 10</option>
                <option value="vocab/vocab_11.json">List 11</option>
                <option value="vocab/vocab_12.json">List 12</option>
                <option value="vocab/vocab_13.json">List 13</option>
                <option value="vocab/vocab_14.json">List 14</option>
                <option value="vocab/vocab_15.json">List 15</option>
                <option value="vocab/vocab_16.json">List 16</option>
                <option value="vocab/vocab_17.json">List 17</option>
                <option value="vocab/vocab_18.json">List 18</option>
                <option value="vocab/vocab_19.json">List 19</option>
                <option value="vocab/vocab_20.json">List 20</option>
                <option value="vocab/vocab_21.json">List 21</option>
                <option value="vocab/vocab_22.json">List 22</option>
                <option value="vocab/vocab_23.json">List 23</option>
            </select>
            <button class="btn-reload" id="reloadList">🔄 Tải lại</button>
        </div>

        <nav class="mode-selector">
            <button class="mode-btn active" data-mode="flashcard">🎴 Flashcard</button>
            <button class="mode-btn" data-mode="vocabulary">📖 Xem từ vựng</button>
            <button class="mode-btn" data-mode="quiz">🎯 Quiz</button>
            <button class="mode-btn" data-mode="typing">⌨️ Luyện gõ</button>
            <button class="mode-btn" data-mode="search">🔍 Tìm kiếm</button>
            <button class="mode-btn" data-mode="review">📅 Ôn tập</button>
        </nav>

        <!-- Flashcard Mode -->
        <div class="mode-content active" id="flashcard-mode">
            <div class="flashcard" id="flashcard">
                <div class="card-front">
                    <img id="wordImage" class="word-image" src="" alt="" onerror="this.style.display='none'">
                    <h2 class="word" id="word"></h2>
                    <p class="phonetic" id="phonetic"></p>
                    <button class="speak-btn" id="speakBtn">🔊 Phát âm</button>
                    <p class="hint">👆 Click để xem nghĩa</p>
                    <div class="voice-loading hidden" id="voiceLoading">
                        <small>⏳ Đang tải giọng đọc...</small>
                    </div>
                </div>
                <div class="card-back hidden">
                    <img id="wordImageBack" class="word-image" src="" alt="" onerror="this.style.display='none'">
                    <p class="meaning" id="meaning"></p>
                    <div class="example">
                        <p class="example-en" id="exampleEn"></p>
                        <p class="example-vi" id="exampleVi"></p>
                    </div>
                    <p class="memory-tip" id="memoryTip"></p>
                </div>
            </div>
            <div class="flashcard-controls">
                <button class="btn btn-secondary" id="prevCard">⬅️ Trước</button>
                <button class="btn btn-primary" id="markLearned">✅ Đã nhớ</button>
                <button class="btn btn-secondary" id="nextCard">Sau ➡️</button>
            </div>
        </div>

        <!-- Other modes continue... (Quiz, Typing, Search, Review, Vocabulary View) -->
        <!-- Copy từ file cũ các phần còn lại -->
        
    </div>

    <script src="js/vocabulary.js"></script>
</body>
</html>
