<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Ngữ Pháp - TOEIC</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/grammar.css">
</head>
<body>
    <div class="container" id="grammarApp">
        <header>
            <button class="btn btn-secondary back-btn" onclick="window.location.href='index.html'">⬅️ Quay lại</button>
            <h1>📝 Học Ngữ Pháp TOEIC</h1>
            <div class="progress-info">
                <span>Đã học: <strong id="topicsLearned">0</strong>/17 chủ đề</span>
            </div>
        </header>

        <!-- Grammar Topics View -->
        <div id="grammarTopicsView">
            <div class="topics-header">
                <h2>Chọn chủ đề ngữ pháp</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-level="all">Tất cả</button>
                    <button class="filter-btn" data-level="Cơ bản">Cơ bản</button>
                    <button class="filter-btn" data-level="Trung bình">Trung bình</button>
                    <button class="filter-btn" data-level="Nâng cao">Nâng cao</button>
                </div>
            </div>
            <div id="grammarTopicsList" class="grammar-topics-grid"></div>
        </div>

        <!-- Grammar Lesson View -->
        <div id="grammarLessonView" style="display: none;">
            <div class="grammar-lesson-container">
                <div class="lesson-header">
                    <button class="btn btn-secondary" onclick="backToGrammarTopics()">⬅️ Quay lại</button>
                    <h2 id="grammarLessonTitle"></h2>
                </div>

                <!-- Tab Navigation -->
                <div class="lesson-tabs">
                    <button class="tab-btn active" data-tab="theory">📖 Lý thuyết</button>
                    <button class="tab-btn" data-tab="examples">💡 Ví dụ</button>
                    <button class="tab-btn" data-tab="notes">📝 Ghi chú</button>
                </div>

                <!-- Theory Tab -->
                <div class="tab-content active" id="theoryTab">
                    <div class="grammar-section">
                        <div id="grammarTheory" class="grammar-theory"></div>
                    </div>
                </div>

                <!-- Examples Tab -->
                <div class="tab-content" id="examplesTab">
                    <div class="grammar-section">
                        <div id="grammarExamples" class="grammar-examples"></div>
                    </div>
                </div>

                <!-- Notes Tab -->
                <div class="tab-content" id="notesTab">
                    <div class="grammar-section">
                        <div class="notes-container">
                            <h3>✍️ Ghi chú của bạn</h3>
                            <textarea id="userNotes" class="notes-textarea" placeholder="Viết ghi chú của bạn ở đây..."></textarea>
                            <button class="btn btn-primary" onclick="saveNotes()">💾 Lưu ghi chú</button>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="lesson-actions">
                    <button class="btn btn-primary btn-large" onclick="startGrammarExercise()">
                        🎯 Làm bài tập
                    </button>
                    <button class="btn btn-secondary btn-large" onclick="markTopicAsLearned()">
                        ✅ Đánh dấu đã học
                    </button>
                </div>
            </div>
        </div>

        <!-- Grammar Exercise View -->
        <div id="grammarExerciseView" style="display: none;">
            <div class="grammar-exercise-container">
                <div class="exercise-header">
                    <button class="btn btn-secondary" onclick="backToGrammarLesson()">⬅️ Quay lại</button>
                    <div class="exercise-progress">
                        <h3>Câu <span id="grammarExerciseCurrent">1</span>/<span id="grammarExerciseTotal">10</span></h3>
                        <div class="progress-bar-small">
                            <div class="progress-fill-small" id="exerciseProgressFill"></div>
                        </div>
                    </div>
                    <p class="score">Điểm: <span id="grammarScore">0</span></p>
                </div>
                
                <div class="exercise-question">
                    <p id="grammarExerciseQuestion"></p>
                </div>
                
                <div id="grammarOptions" class="grammar-options"></div>
                <div id="grammarFeedback" class="grammar-feedback"></div>
            </div>
        </div>
    </div>

    <script src="js/grammar.js"></script>
</body>
</html>
